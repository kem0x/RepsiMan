<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pepsiman Recompiled — Web</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #070b17; color: #eef3ff; }
    main { width: min(960px, 100%); padding: 24px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: clamp(24px, 4vw, 40px); }
    p { color: #aebbd7; margin: 0 0 18px; }
    .panel { background: #10182b; border: 1px solid #263653; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    label { display: grid; gap: 7px; color: #dbe6ff; font-weight: 650; }
    input, button { font: inherit; }
    input[type=file] { width: 100%; padding: 10px; background: #0a1020; border: 1px solid #34486d; border-radius: 8px; color: #b8c7e8; }
    button { border: 0; border-radius: 9px; padding: 11px 16px; background: #245df5; color: white; font-weight: 750; cursor: pointer; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    #fullscreen { background: #283650; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; align-items: center; }
    #status { color: #8fb4ff; font-variant-numeric: tabular-nums; }
    .screen { background: #000; border: 1px solid #263653; border-radius: 12px; overflow: hidden; aspect-ratio: 4 / 3; display: grid; place-items: center; }
    canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; outline: none; }
    pre { max-height: 150px; overflow: auto; margin: 12px 0 0; padding: 10px; background: #080d18; color: #9db0d6; border-radius: 8px; font-size: 12px; white-space: pre-wrap; }
    body.running { overflow: hidden; }
    body.running main { width: min(1280px, 100%); height: 100dvh; padding: 8px; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    body.running h1, body.running main > p, body.running .inputs, body.running #log { display: none; }
    body.running .panel { margin: 0 0 8px; padding: 8px; }
    body.running .actions { margin: 0; }
    body.running .screen { min-height: 0; aspect-ratio: auto; }
    body.remote-assets .inputs { display: none; }
  </style>
</head>
<body>
<main>
  <h1>Pepsiman Recompiled</h1>
  <p>Your BIOS and disc stay in this browser tab. Nothing is uploaded.</p>
  <section class="panel" id="loader">
    <div class="inputs">
      <label>PS1 BIOS
        <input id="bios" type="file" accept=".bin,.rom,application/octet-stream">
      </label>
      <label>Disc files (select the CUE and every BIN track)
        <input id="disc" type="file" accept=".cue,.bin,application/octet-stream" multiple>
      </label>
    </div>
    <div class="actions">
      <button id="start" disabled>Start game</button>
      <button id="test-start" type="button" hidden>Test Start input</button>
      <button id="fullscreen" type="button">Fullscreen</button>
      <span id="status">Loading WebAssembly…</span>
    </div>
    <pre id="log" aria-live="polite"></pre>
  </section>
  <section class="screen">
    <canvas id="canvas" width="640" height="480" tabindex="0"></canvas>
  </section>
</main>
<script>
  const biosInput = document.getElementById('bios');
  const discInput = document.getElementById('disc');
  const startButton = document.getElementById('start');
  const testStartButton = document.getElementById('test-start');
  const statusNode = document.getElementById('status');
  const logNode = document.getElementById('log');
  const canvas = document.getElementById('canvas');
  const urlParams = new URLSearchParams(location.search);
  const preloadedTestAssets = urlParams.has('preloaded-test-assets');
  const remoteAssetsToken = urlParams.get('remote-assets');
  let runtimeReady = false;
  let started = false;
  let aborted = false;

  function log(line) {
    if (aborted && String(line).includes('emscripten_proxy_async failed')) return;
    logNode.textContent += `${line}\n`;
    if (logNode.textContent.length > 65536)
      logNode.textContent = logNode.textContent.slice(-49152);
    logNode.scrollTop = logNode.scrollHeight;
  }
  function setStatus(text) {
    // Emscripten schedules an empty status after initialization. Do not let it
    // erase our useful Ready/Running state.
    if (text || !runtimeReady) statusNode.textContent = text;
  }
  function updateStart() {
    const files = [...discInput.files];
    const selectedAssets = biosInput.files[0] &&
      files.some(file => file.name.toLowerCase().endsWith('.cue')) &&
      files.some(file => file.name.toLowerCase().endsWith('.bin'));
    startButton.disabled = !runtimeReady || started ||
      (!preloadedTestAssets && !remoteAssetsToken && !selectedAssets);
  }
  biosInput.addEventListener('change', updateStart);
  discInput.addEventListener('change', updateStart);
  if (preloadedTestAssets) testStartButton.hidden = false;
  if (remoteAssetsToken) {
    document.body.classList.add('remote-assets');
    document.querySelector('main > p').textContent =
      'Private LAN test — BIOS and disc data will be read from your Mac.';
  }

  testStartButton.addEventListener('click', () => {
    if (!started || typeof Module._psx_web_test_set_start !== 'function') return;
    Module._psx_web_test_set_start(1);
    setTimeout(() => Module._psx_web_test_set_start(0), 1000);
    canvas.focus();
  });

  function tomlString(value) {
    return value.replaceAll('\\', '\\\\').replaceAll('"', '\\"');
  }
  async function installFile(file, path) {
    setStatus(`Loading ${file.name}…`);
    const bytes = new Uint8Array(await file.arrayBuffer());
    // Let MEMFS own the browser ArrayBuffer instead of duplicating every disc
    // track into the WASM linear heap. Gameplay needs that heap for level data.
    Module.FS.writeFile(path, bytes, { canOwn: true });
  }
  async function installRemoteFile(sourcePath, targetPath) {
    const encodedPath = sourcePath.split('/').map(encodeURIComponent).join('/');
    const fileName = sourcePath.split('/').at(-1);
    setStatus(`Reading ${fileName} from your Mac…`);
    const response = await fetch(
      `/__repsiman_assets__/${encodedPath}?token=${encodeURIComponent(remoteAssetsToken)}`,
      { cache: 'no-store' });
    if (!response.ok)
      throw new Error(`Asset request failed (${response.status}): ${sourcePath}`);
    const expected = Number(response.headers.get('Content-Length')) || 0;
    let bytes;
    if (response.body && expected > 0) {
      bytes = new Uint8Array(expected);
      const reader = response.body.getReader();
      let received = 0;
      let lastStatusAt = 0;
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        bytes.set(value, received);
        received += value.byteLength;
        if (received - lastStatusAt >= 1048576 || received === expected) {
          setStatus(`Reading ${fileName}: ${(received / 1048576).toFixed(1)} / ${(expected / 1048576).toFixed(1)} MiB`);
          lastStatusAt = received;
        }
      }
      if (received !== expected)
        throw new Error(`Incomplete asset (${received} of ${expected} bytes): ${sourcePath}`);
    } else {
      bytes = new Uint8Array(await response.arrayBuffer());
    }
    Module.FS.writeFile(targetPath, bytes, { canOwn: true });
    return bytes.byteLength;
  }
  function makeGameConfig(cueName) {
    const testFastBoot = preloadedTestAssets ? 'true' : 'false';
    return `[game]\nname = "Pepsiman"\nid = "SLPS-01762"\nexe = "game/SLPS_017.62"\ndisc = "/game/disc/${tomlString(cueName)}"\nload_address = "0x80010000"\nentry_pc = "0x80042C58"\ntext_size = "0x00085800"\nstack_base = "0x801FFFF0"\n\n[recompiler]\nseeds = "seeds/functions.txt"\nstrict = true\nout_dir = "generated"\n\n[runtime]\ndebug_port = 0\nwindow_title = "Pepsiman Recompiled — Web"\nmemcard_dir = "/saves"\ndisc_speed = "1x"\nbios_hle = ${testFastBoot}\nfast_boot = ${testFastBoot}\noverlay_cache = false\noverlay_backend = "interp"\nturbo_loads = false\nhle_scheduler = true\n\n[video]\nrenderer = "software"\nsupersampling = 1\nantialiasing = false\ntexture_filtering = "nearest"\naspect_ratio = "4:3"\n\n[controller]\ndefault_analog = false\ndeadzone = 12000\n`;
  }

  startButton.addEventListener('click', async () => {
    try {
      started = true;
      updateStart();
      document.body.classList.add('running');
      Module.FS.mkdirTree('/saves');
      if (preloadedTestAssets) {
        const cueName = 'Pepsiman (Japan).cue';
        Module.FS.writeFile('/game.toml', makeGameConfig(cueName));
        setStatus('Starting private preloaded test build…');
        canvas.focus();
        Module.callMain([
          '--game', '/game.toml',
          '--bios', '/bios/SCPH1001.BIN',
          '--disc', `/game/disc/${cueName}`,
          '--renderer', 'software',
          '--no-launcher'
        ]);
        setStatus('Running — click the canvas for audio and controls.');
        return;
      }
      if (remoteAssetsToken) {
        const cueName = 'Pepsiman (Japan).cue';
        const discNames = [
          cueName,
          'Pepsiman (Japan) (Track 1).bin',
          'Pepsiman (Japan) (Track 2).bin',
          'Pepsiman (Japan) (Track 3).bin',
          'Pepsiman (Japan) (Track 4).bin',
          'Pepsiman (Japan) (Track 5).bin',
          'Pepsiman (Japan) (Track 6).bin',
          'Pepsiman (Japan) (Track 7).bin',
          'Pepsiman (Japan) (Track 8).bin'
        ];
        Module.FS.mkdirTree('/bios');
        Module.FS.mkdirTree('/game/disc');
        await installRemoteFile('SCPH1001.bin', '/bios/SCPH1001.BIN');
        let loaded = 0;
        for (const name of discNames) {
          loaded += await installRemoteFile(`PEPSIMAN/${name}`, `/game/disc/${name}`);
          setStatus(`Read ${(loaded / 1048576).toFixed(1)} MiB from your Mac…`);
        }
        Module.FS.writeFile('/game.toml', makeGameConfig(cueName));
        setStatus('Starting game…');
        canvas.focus();
        Module.callMain([
          '--game', '/game.toml',
          '--bios', '/bios/SCPH1001.BIN',
          '--disc', `/game/disc/${cueName}`,
          '--renderer', 'software',
          '--no-launcher'
        ]);
        setStatus('Running — tap the canvas for audio and controls.');
        return;
      }
      const bios = biosInput.files[0];
      const discFiles = [...discInput.files];
      const cue = discFiles.find(file => file.name.toLowerCase().endsWith('.cue'));
      Module.FS.mkdirTree('/bios');
      Module.FS.mkdirTree('/game/disc');
      await installFile(bios, '/bios/SCPH1001.BIN');
      let loaded = 0;
      for (const file of discFiles) {
        await installFile(file, `/game/disc/${file.name}`);
        loaded += file.size;
        setStatus(`Loaded ${(loaded / 1048576).toFixed(1)} MiB of disc data…`);
      }
      Module.FS.writeFile('/game.toml', makeGameConfig(cue.name));
      setStatus('Starting game… click the screen for audio and controls.');
      canvas.focus();
      Module.callMain([
        '--game', '/game.toml',
        '--bios', '/bios/SCPH1001.BIN',
        '--disc', `/game/disc/${cue.name}`,
        '--renderer', 'software',
        '--no-launcher'
      ]);
      setStatus('Running — click the canvas for audio and controls.');
    } catch (error) {
      started = false;
      document.body.classList.remove('running');
      log(error?.stack || String(error));
      setStatus('Start failed — see the log.');
      updateStart();
    }
  });

  document.getElementById('fullscreen').addEventListener('click', () => {
    canvas.requestFullscreen?.();
    canvas.focus();
  });

  var Module = {
    noInitialRun: true,
    canvas,
    print: text => log(text),
    printErr: text => log(`ERROR: ${text}`),
    setStatus,
    onRuntimeInitialized() {
      runtimeReady = true;
      setStatus(preloadedTestAssets
        ? 'Ready — private test assets are preloaded.'
        : remoteAssetsToken
          ? 'Ready — press Start to read the private assets from your Mac.'
          : 'Ready — select your BIOS and all disc files.');
      updateStart();
    },
    onAbort(reason) {
      aborted = true;
      document.body.classList.remove('running');
      log(`ABORT: ${reason}`);
      setStatus('Runtime aborted — see the log.');
    }
  };
</script>
{{{ SCRIPT }}}
</body>
</html>
